name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # mold accelerates dev builds; coverage uses lld for llvm-tools compatibility.
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@2df9e28eb87988518ef3880c34edad45d65b1668
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Setup uv
        uses: astral-sh/setup-uv@12d13f90bc3a5a1971bebad4beb09a4dfa962e91
      - name: Check spelling
        run: make spelling
      - name: Install test runner
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-nextest
      - name: Install cargo-audit
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-audit
      - name: Setup Python for audit manifest extraction
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.x'
      - name: Cache Whitaker installation
        id: cache-whitaker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.local/bin/whitaker
            ~/.dylint_drivers
            ~/.local/share/whitaker
          key: whitaker-v3-${{ runner.os }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        env:
          RUSTFLAGS: ""
          WHITAKER_CACHE_HIT: ${{ steps.cache-whitaker.outputs.cache-hit }}
        run: |
          set -euo pipefail
          echo "Whitaker cache hit: ${WHITAKER_CACHE_HIT}"
          if [ "${WHITAKER_CACHE_HIT}" != "true" ]; then
            echo "Installing whitaker-installer ${WHITAKER_INSTALLER_VERSION}"
            cargo binstall --no-confirm --locked \
              whitaker-installer@"${WHITAKER_INSTALLER_VERSION}"
          fi
          whitaker-installer --cranelift
          echo "Whitaker binary: $(command -v whitaker || true)"
      - name: Audit dependencies
        run: make audit
      - name: Lint
        run: make lint
      - name: Log coverage linker configuration
        run: |
          echo "Coverage linker: clang"
          echo "Coverage RUSTFLAGS: -Zpolonius=next -C link-arg=-fuse-ld=lld"
          echo "Coverage CFLAGS: -fuse-ld=lld"
          echo "Coverage LDFLAGS: -fuse-ld=lld"
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@455d9ed03477c0026da96c2541ca26569a74acac
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          RUSTFLAGS: -Zpolonius=next -C link-arg=-fuse-ld=lld
          CFLAGS: -fuse-ld=lld
          LDFLAGS: -fuse-ld=lld
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@455d9ed03477c0026da96c2541ca26569a74acac
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
